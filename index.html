let chainDraft = null;

function chainNewDraft(symbol){
  const meta = findSymbolMeta(symbol) || MARKET_SYMBOLS[0];
  const quote = MarketDataService.getQuote(meta.symbol);
  const spot = quote ? quote.ltp : meta.basePrice;
  const atm = roundToStrikeStep(spot, meta.strikeStep);
  const rows = [];
  for(let i=-3;i<=3;i++){
    rows.push({id:uid(), strike: atm + i*meta.strikeStep, ceOI:0, ceVolume:0, cePremium:0, ceIV:0, peOI:0, peVolume:0, pePremium:0, peIV:0});
  }
  return {symbol:meta.symbol, expiryLabel:'', underlyingPrice:spot, rows};
}
function computeChainAnalytics(rows){
  const totalCeOI = rows.reduce((s,r)=>s+(Number(r.ceOI)||0),0);
  const totalPeOI = rows.reduce((s,r)=>s+(Number(r.peOI)||0),0);
  const pcr = totalCeOI>0 ? totalPeOI/totalCeOI : 0;
  let maxPainStrike=null, minPain=Infinity;
  rows.forEach(candidate=>{
    const S = candidate.strike;
    let pain = 0;
    rows.forEach(row=>{
      pain += (Number(row.ceOI)||0)*Math.max(0, S-row.strike);
      pain += (Number(row.peOI)||0)*Math.max(0, row.strike-S);
    });
    if(pain<minPain){ minPain=pain; maxPainStrike=S; }
  });
  const support = rows.length ? rows.reduce((max,r)=> (Number(r.peOI)||0)>(Number(max.peOI)||0)?r:max) : null;
  const resistance = rows.length ? rows.reduce((max,r)=> (Number(r.ceOI)||0)>(Number(max.ceOI)||0)?r:max) : null;
  return {pcr, maxPainStrike, totalCeOI, totalPeOI, supportStrike: support?support.strike:null, resistanceStrike: resistance?resistance.strike:null};
}
function classifyBuildup(curOI, curPremium, prevOI, prevPremium){
  if(prevOI==null || prevPremium==null) return null;
  const oiUp = curOI > prevOI, premUp = curPremium > prevPremium;
  if(oiUp && premUp) return {label:'Long Buildup', cls:'profit'};
  if(oiUp && !premUp) return {label:'Short Buildup', cls:'loss'};
  if(!oiUp && !premUp) return {label:'Long Unwinding', cls:'warn'};
  if(!oiUp && premUp) return {label:'Short Covering', cls:'accent'};
  return null;
}
function findPreviousChainSnapshot(symbol, excludeId){
  return [...state.optionChainSnapshots]
    .filter(s=>s.symbol===symbol && s.id!==excludeId)
    .sort((a,b)=> new Date(b.capturedAt)-new Date(a.capturedAt))[0] || null;
}
function moneynessBadge(strike, spot, side){
  const isCall = side==='ce';
  const itm = isCall ? strike < spot : strike > spot;
  const atm = Math.abs(strike-spot) < (spot*0.0025);
  if(atm) return '<span class="badge badge-accent">ATM</span>';
  return itm ? '<span class="badge badge-profit">ITM</span>' : '<span class="badge badge-neutral">OTM</span>';
}

  const peBuild = prevRow ? classifyBuildup(Number(row.peOI)||0, Number(row.pePremium)||0, Number(prevRow.peOI)||0, Number(prevRow.pePremium)||0) : null;

    <td style="text-align:center;background:rgba(255,255,255,0.03);">
      <div class="mono" style="font-weight:700;">${row.strike}</div>
      ${moneynessBadge(row.strike, spot, 'ce')}
      <button class="icon-btn" style="width:22px;height:22px;margin-top:4px;" data-action="chain-remove-row" data-id="${row.id}">${lucideIcon('x')}</button>

   PART 15 — VOLATILITY ANALYSIS
   ============================================================ */
let volSelectedSymbol = null;
let volIvChartInstance = null;
let volHvChartInstance = null;

function volObservationsFor(symbol){
  return state.volatilityObservations.filter(o=>o.symbol===symbol).sort((a,b)=>new Date(a.date)-new Date(b.date));
}
function computeHistoricalVolatility(obs){
  if(obs.length<2) return null;
  const returns = [];
  for(let i=1;i<obs.length;i++){
    if(obs[i].closePrice>0 && obs[i-1].closePrice>0) returns.push(Math.log(obs[i].closePrice/obs[i-1].closePrice));
  }
  if(returns.length<2) return null;
  const mean = returns.reduce((a,b)=>a+b,0)/returns.length;
  const variance = returns.reduce((a,b)=>a+(b-mean)*(b-mean),0)/(returns.length-1);
  return Math.sqrt(variance)*Math.sqrt(252)*100;
}
function computeIVRankPercentile(obs, currentIV){
  const ivs = obs.map(o=>o.impliedVol).filter(v=>v!=null && v>0);
  if(ivs.length<2 || currentIV==null) return {rank:null, percentile:null};
  const min = Math.min(...ivs), max = Math.max(...ivs);
  const rank = max>min ? ((currentIV-min)/(max-min))*100 : 50;
  const below = ivs.filter(v=>v<=currentIV).length;
  return {rank: clamp(rank,0,100), percentile: (below/ivs.length)*100};
}
function classifyVolRegime(ivRank){
  if(ivRank==null) return {label:'Insufficient Data', cls:'neutral'};
  if(ivRank<25) return {label:'Low', cls:'profit'};
  if(ivRank<65) return {label:'Normal', cls:'accent'};
  if(ivRank<85) return {label:'High', cls:'warn'};
  return {label:'Extreme', cls:'loss'};
}
function volGaugeHtml(ivRank, regime){
  const pos = ivRank==null ? 0 : clamp(ivRank,0,100);
  return `<div style="margin-bottom:6px;">
    <div style="display:flex;height:10px;border-radius:99px;overflow:hidden;">
      <div style="flex:25;background:var(--profit);"></div>
      <div style="flex:40;background:var(--accent);"></div>
      <div style="flex:20;background:var(--warn);"></div>
      <div style="flex:15;background:var(--loss);"></div>
    </div>
    <div style="position:relative;height:14px;">
      <div style="position:absolute;left:${pos}%;top:0;transform:translateX(-50%);width:2px;height:14px;background:#fff;box-shadow:0 0 6px rgba(255,255,255,0.8);"></div>

/* ============================================================
   PART 16 — BACKTESTING ENGINE
   Full CSV import, column mapping, 15 performance metrics,
   equity curve, drawdown curve, monthly heatmap, histogram.
   ============================================================ */
let btActiveProfile = null;
let btColumnMap = {};
let btParsedRows = [];

let btDdChartInst = null;

// ---------- Metrics engine ----------
function computeBacktestMetrics(trades, initialCapital){
  const capital = initialCapital || 100000;
  const closed = trades.filter(t => t.pnl != null);
  if(!closed.length) return null;

  const sorted = [...closed].sort((a,b) => new Date(a.date) - new Date(b.date));
  const wins = sorted.filter(t => t.pnl > 0);
  const losses = sorted.filter(t => t.pnl < 0);

  const grossProfit = wins.reduce((s,t) => s+t.pnl, 0);
  const grossLoss = Math.abs(losses.reduce((s,t) => s+t.pnl, 0));
  const netPnl = grossProfit - grossLoss;

  const winRate = (wins.length / sorted.length) * 100;
  const avgWin = wins.length ? grossProfit / wins.length : 0;
  const avgLoss = losses.length ? grossLoss / losses.length : 0;
  const profitFactor = grossLoss > 0 ? grossProfit / grossLoss : (grossProfit > 0 ? Infinity : 0);
  const expectancy = (winRate/100)*avgWin - (1-winRate/100)*avgLoss;
  const largestWin = wins.length ? Math.max(...wins.map(t=>t.pnl)) : 0;
  const largestLoss = losses.length ? Math.max(...losses.map(t=>Math.abs(t.pnl))) : 0;

  // Consecutive wins/losses
  let maxConsecWins=0, maxConsecLosses=0, curW=0, curL=0;
  sorted.forEach(t => {
    if(t.pnl>0){ curW++; curL=0; maxConsecWins=Math.max(maxConsecWins,curW); }
    else{ curL++; curW=0; maxConsecLosses=Math.max(maxConsecLosses,curL); }
  });

  // Equity curve & drawdown
  let equity = capital, peak = capital;
  let maxDD = 0, maxDDPct = 0;
  const curve = [];
  sorted.forEach(t => {
    equity += t.pnl;
    peak = Math.max(peak, equity);
    const dd = peak - equity;
    const ddPct = peak > 0 ? (dd/peak)*100 : 0;
    maxDD = Math.max(maxDD, dd);
    maxDDPct = Math.max(maxDDPct, ddPct);
    curve.push({date:t.date, equity, dd:ddPct});
  });

  // CAGR
  const firstDate = new Date(sorted[0].date);
  const lastDate = new Date(sorted[sorted.length-1].date);
  const years = Math.max((lastDate-firstDate)/(365.25*24*3600*1000), 1/365);
  const cagr = years > 0 ? (Math.pow(equity/capital, 1/years) - 1)*100 : 0;

  // Sharpe & Sortino from daily P&L
  const dayMap = {};
  sorted.forEach(t => { const d=t.date.slice(0,10); dayMap[d]=(dayMap[d]||0)+t.pnl; });
  const dailyRets = Object.values(dayMap).map(p => capital>0?p/capital:0);
  const meanRet = dailyRets.length ? dailyRets.reduce((a,b)=>a+b,0)/dailyRets.length : 0;
  const retVariance = dailyRets.length>1 ? dailyRets.reduce((a,b)=>a+(b-meanRet)*(b-meanRet),0)/(dailyRets.length-1) : 0;
  const retStdev = Math.sqrt(retVariance);
  const sharpe = retStdev>0 ? (meanRet/retStdev)*Math.sqrt(252) : 0;
  const downRets = dailyRets.filter(r=>r<0);
  const downVariance = downRets.length>1 ? downRets.reduce((a,b)=>a+b*b,0)/downRets.length : 0;
  const sortino = downVariance>0 ? (meanRet/Math.sqrt(downVariance))*Math.sqrt(252) : 0;

  const recoveryFactor = maxDD > 0 ? netPnl/maxDD : (netPnl>0?Infinity:0);

  // Monthly returns
  const monthMap = {};
  sorted.forEach(t => { const ym=t.date.slice(0,7); monthMap[ym]=(monthMap[ym]||0)+t.pnl; });

  // Yearly returns
  const yearMap = {};
  sorted.forEach(t => { const y=t.date.slice(0,4); yearMap[y]=(yearMap[y]||0)+t.pnl; });

  return {
    totalTrades:sorted.length, wins:wins.length, losses:losses.length,
    winRate, avgWin, avgLoss, grossProfit, grossLoss, netPnl,
    profitFactor, expectancy, largestWin, largestLoss,
    maxConsecWins, maxConsecLosses,
    cagr, sharpe, sortino, recoveryFactor,
    maxDD, maxDDPct, equity, capital,
    curve, monthMap, yearMap, dailyRets,
  };
}

// ---------- CSV parser & column mapper ----------
function parseCSVText(text){
  const lines = text.trim().split('\n').filter(l=>l.trim());
  if(lines.length<2) return {headers:[], rows:[]};
  const parseRow = line => {
    const cells=[]; let cur='', inQ=false;
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'&&!inQ){inQ=true;}
      else if(c==='"'&&inQ&&line[i+1]==='"'){cur+='"';i++;}
      else if(c==='"'&&inQ){inQ=false;}
      else if(c===','&&!inQ){cells.push(cur.trim());cur='';}
      else cur+=c;
    }
    cells.push(cur.trim());
    return cells;
  };
  const headers = parseRow(lines[0]);
  const rows = lines.slice(1).map(l=>{ const vals=parseRow(l); const obj={}; headers.forEach((h,i)=>obj[h]=vals[i]||''); return obj; });
  return {headers, rows};
}
function inferColumnMap(headers){
  const map = {};
  const lower = headers.map(h=>h.toLowerCase());
  const findBest = (keywords) => { for(const kw of keywords){ const i=lower.findIndex(h=>h.includes(kw)); if(i>-1) return headers[i]; } return ''; };
  map.date   = findBest(['date','entry date','trade date','open date']);
  map.pnl    = findBest(['pnl','profit','net profit','net pnl','p&l','gain','loss']);
  map.symbol = findBest(['symbol','ticker','instrument','scrip','stock']);
  map.side   = findBest(['side','direction','type','action','buy/sell']);
  map.qty    = findBest(['qty','quantity','lots','size','shares']);
  map.notes  = findBest(['notes','note','comment','remarks','description']);
  return map;
}
function applyColumnMap(rows, map){
  return rows.map(row => {
    const rawPnl = map.pnl ? row[map.pnl] : '';
    const pnlNum = rawPnl ? parseFloat(String(rawPnl).replace(/[₹$,\s]/g,'')) : null;
    const rawDate = map.date ? row[map.date] : '';
    let date = rawDate;
    if(!date || isNaN(Date.parse(date))) date = todayISO();
    return {
      date: date.slice(0,10),
      pnl: isNaN(pnlNum) ? null : pnlNum,
      symbol: map.symbol ? (row[map.symbol]||'') : '',
      side: map.side ? (row[map.side]||'') : '',
      qty: map.qty ? Number(row[map.qty]||0) : 0,
      notes: map.notes ? (row[map.notes]||'') : '',
      _raw: row,
    };
  });
}

    if(!name) return;

    navigateTo('backtesting');
  });

        navigateTo('backtesting');
      }});
    }
  });
  refreshIcons();
}

async function saveBtProfile(name, trades){
  const metrics = trades.length >= 2 ? computeBacktestMetrics(trades, 100000) : null;
  const profile = {id:uid(), name, trades, metrics, initialCapital:100000, createdAt:new Date().toISOString()};
  await dbPut('backtests', profile);
  const idx = state.backtests.findIndex(b=>b.id===profile.id);
  if(idx>-1) state.backtests[idx]=profile; else state.backtests.push(profile);
  return profile;
}

let replayIndex = 0;
let replayTimer = null;
let replaySpeed = 1000;
let replayEquityChartInst = null;

function getReplayTrades(){
  return [...state.journal]
    .filter(t => t.date || t.entryDate || t.openedAt)
    .sort((a,b)=>{ const da=new Date(a.date||a.entryDate||a.openedAt); const db=new Date(b.date||b.entryDate||b.openedAt); return da-db; });
}
function replayRunningStats(trades, upToIdx){
  let capital=safeNum(state.settings.totalCapital,1000000), cumPnl=0, wins=0, losses=0;
  for(let i=0;i<=upToIdx&&i<trades.length;i++){
    const pnl=safeNum(trades[i].pnl,0); cumPnl+=pnl; capital+=pnl;
    if(pnl>0) wins++; if(pnl<0) losses++;
  }
  return {capital, cumPnl, wins, losses, winRate:safeDiv(wins,upToIdx+1,0)*100};
}
function replaySessionSummary(trades){
  if(!trades.length) return '';
  const closed=trades.filter(t=>t.pnl!=null);
  if(closed.length<2) return '';
  const total=closed.reduce((s,t)=>s+safeNum(t.pnl,0),0);
  const wins=closed.filter(t=>safeNum(t.pnl,0)>0);
  const losses=closed.filter(t=>safeNum(t.pnl,0)<0);
  const winRate=safeDiv(wins.length,closed.length,0)*100;
  const avgWin=wins.length?safeDiv(wins.reduce((s,t)=>s+safeNum(t.pnl,0),0),wins.length):0;
  const avgLoss=losses.length?safeDiv(Math.abs(losses.reduce((s,t)=>s+safeNum(t.pnl,0),0)),losses.length):0;
  const emotions={};
  trades.forEach(t=>{ if(t.emotion) emotions[t.emotion]=(emotions[t.emotion]||0)+1; });
  const topEmotion=Object.entries(emotions).sort((a,b)=>b[1]-a[1])[0];
  const mistakes=trades.filter(t=>t.mistakes&&t.mistakes.trim()).length;
  return '<div class="card" style="margin-top:16px;">'+
    '<div class="card-title"><span>Session Summary</span>'+lucideIcon('bar-chart-3')+'</div>'+
    '<div class="kpi-grid">'+
    kpiCard('Net P&L',formatMoney(total),pnlClass(total),'trending-up')+
    kpiCard('Win Rate',formatPct(winRate,1),winRate>=50?'profit':'loss','percent')+
    kpiCard('Avg Win',formatMoney(avgWin),'profit','arrow-up')+
    kpiCard('Avg Loss',formatMoney(avgLoss),'loss','arrow-down')+
    kpiCard('Trades',String(closed.length),'','list')+
    kpiCard('Top Emotion',topEmotion?topEmotion[0]:'—','','heart')+
    kpiCard('Trades w/ Mistakes',String(mistakes),mistakes>0?'warn':'profit','alert-triangle')+
    kpiCard('With Notes',String(trades.filter(t=>t.notes&&t.notes.trim()).length),'','file-text')+
    '</div>'+
    (closed.length>=2?'<div style="height:160px;margin-top:12px;"><canvas id="replay-equity-canvas"></canvas></div>':'')+
    '</div>';
}
function drawReplayEquityChart(trades){
  const canvas=document.getElementById('replay-equity-canvas');
  if(!canvas||typeof Chart==='undefined') return;
  if(replayEquityChartInst){replayEquityChartInst.destroy();replayEquityChartInst=null;}
  const capital=safeNum(state.settings.totalCapital,1000000);
  let cum=capital;
  const closed=trades.filter(t=>t.pnl!=null).sort((a,b)=>new Date(a.date||a.openedAt)-new Date(b.date||b.openedAt));
  const labels=['Start',...closed.map(t=>(t.date||t.openedAt||'').slice(5,10))];
  const data=[capital,...closed.map(t=>{cum+=safeNum(t.pnl,0);return cum;})];
  replayEquityChartInst=new Chart(canvas.getContext('2d'),{
    type:'line',data:{labels,datasets:[{data,borderColor:'#5b8def',borderWidth:2,pointRadius:2,fill:true,
      backgroundColor:(ctx)=>{const g=ctx.chart.ctx.createLinearGradient(0,0,0,120);g.addColorStop(0,'rgba(91,141,239,0.22)');g.addColorStop(1,'rgba(91,141,239,0)');return g;}}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{color:'#5a6275',maxTicksLimit:8,font:{size:9}},grid:{display:false}},
        y:{ticks:{color:'#5a6275',font:{size:9},callback:v=>formatMoney(v)},grid:{color:'rgba(255,255,255,0.06)'}}}}
  });
}

function renderReplayState(){
  const trades=getReplayTrades();
  if(!trades.length){const wrap=document.getElementById('replay-main');if(wrap)wrap.innerHTML=emptyState('book-open','No entries','Add journal trades first.');return;}
  const t=trades[replayIndex], stats=replayRunningStats(trades,replayIndex);
  const mainWrap=document.getElementById('replay-main'); if(mainWrap) mainWrap.innerHTML=replayTradeCardHtml(t,replayIndex,trades.length,stats);
  const slider=document.getElementById('replay-slider'); if(slider) slider.value=replayIndex;
  const bar=document.getElementById('replay-progress-bar'); if(bar) bar.style.width=safeDiv(replayIndex,Math.max(trades.length-1,1))*100+'%';
  const counter=document.getElementById('replay-counter'); if(counter) counter.textContent=(replayIndex+1)+' / '+trades.length;
  const prevBtn=document.getElementById('replay-prev'); if(prevBtn) prevBtn.disabled=replayIndex<=0;
  const nextBtn=document.getElementById('replay-next'); if(nextBtn) nextBtn.disabled=replayIndex>=trades.length-1;
  refreshIcons();
}
function replayStopAutoplay(){
  if(replayTimer){clearInterval(replayTimer);replayTimer=null;}
  const pb=document.getElementById('replay-play-btn'); if(pb) pb.innerHTML=lucideIcon('play')+' Play';
}
function replayToggleAutoplay(){
  if(replayTimer){replayStopAutoplay();return;}
  const pb=document.getElementById('replay-play-btn'); if(pb) pb.innerHTML=lucideIcon('pause')+' Pause';
  const trades=getReplayTrades();
  replayTimer=setInterval(()=>{if(replayIndex>=trades.length-1){replayStopAutoplay();return;}replayIndex++;renderReplayState();},replaySpeed);
}

  const trades=getReplayTrades();
  container.innerHTML='<div class="view-head-row"><div><h1>Trade Replay</h1><p class="sub">Step through your journal trade-by-trade — running capital, emotion, session summary</p></div>'+

function saveAIKeys(keys){ try{ localStorage.setItem(AI_KEY_LS, JSON.stringify(keys)); }catch(e){} }
function getActiveAIKey(){
  const keys = loadAIKeys();
  if(keys.provider==='gemini' && keys.gemini) return {provider:'gemini', key:keys.gemini};
  if(keys.provider==='openai' && keys.openai) return {provider:'openai', key:keys.openai};
  if(keys.openai) return {provider:'openai', key:keys.openai};

function buildJournalContext(mode){
  const all = [...state.journal].sort((a,b)=>new Date(b.date||b.openedAt)-new Date(a.date||a.openedAt));
  let trades = all;
  if(mode==='daily') trades = all.filter(t=>{ const d=t.date||t.openedAt||''; return d.slice(0,10)===todayISO(); });
  else if(mode==='weekly') trades = all.filter(t=>{ const d=new Date(t.date||t.openedAt||Date.now()); return (Date.now()-d.getTime())<7*86400000; });
  else if(mode==='monthly') trades = all.filter(t=>{ const d=t.date||t.openedAt||''; return d.slice(0,7)=== new Date().toISOString().slice(0,7); });
  else trades = all.slice(0, 40);
  return trades.map(t=>`Date:${(t.date||t.openedAt||'').slice(0,10)} Strategy:${t.strategyName||'?'} Status:${t.status||'?'} PnL:${t.pnl??'?'} Emotion:${t.emotion||'?'} Mistakes:${t.mistakes||'none'} Rating:${t.rating||'?'} Notes:${(t.notes||'').slice(0,80)}`).join('\n');
}

function buildAIPrompt(mode, customQuery){
  const context = buildJournalContext(mode);
  const tradeCount = state.journal.length;
  const totalPnl = state.journal.reduce((s,t)=>s+Number(t.pnl||0),0);

  const systemPrompt = `You are an expert trading coach and performance analyst for Indian options markets (NSE/BSE). You have access to a trader's journal data and must provide specific, actionable, honest feedback. Be direct. Focus on patterns, psychology, and concrete improvements. Use INR (₹) for monetary values. Keep responses concise and structured.`;

  const modePrompts = {
    daily: `Analyze today's trades and provide a daily review:\n${context||'No trades today.'}`,
    weekly: `Analyze this week's trades for patterns and insights:\n${context||'No trades this week.'}`,
    monthly: `Provide a monthly performance review with key patterns:\n${context||'No trades this month.'}`,
    mistakes: `Identify recurring mistakes and behavioural patterns from these ${tradeCount} trades. Total P&L: ₹${formatNum(totalPnl,0)}.\n${context}`,
    emotions: `Analyze emotional patterns in these trades. Which emotions correlate with losses? With wins? What is the behavioural signature?\n${context}`,
    patterns: `Detect strategy, timing and setup patterns. Which combinations work? Which fail? Include statistics.\n${context}`,
    summary: `Summarize overall trading performance across ${tradeCount} trades (₹${formatNum(totalPnl,0)} net P&L). Top insights, risks, strengths.\n${context}`,
    losing: `Why is this trader losing money? Identify the root causes from this journal data:\n${context||'No closed trades with P&L data.'}`,
    weekday: `Which day of the week produces the best and worst results? Analyse each day's trades:\n${context}`,
    worstStrategy: `Which strategy is performing worst and why? Provide evidence from the data:\n${context}`,
    emotional: `Which trades were the most emotionally driven? What was the outcome? What should change?\n${context}`,
    custom: customQuery || 'Summarize the trading journal data.',
  };

  return { systemPrompt, userPrompt: modePrompts[mode] || modePrompts.summary };
}

async function callOpenAI(key, systemPrompt, userPrompt){
  const res = await fetch('https://api.openai.com/v1/chat/completions', {
    method:'POST',
    headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
    body:JSON.stringify({model:'gpt-4o-mini', max_tokens:1500, messages:[{role:'system',content:systemPrompt},{role:'user',content:userPrompt}]})
  });
  if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error((err.error&&err.error.message)||'OpenAI API error '+res.status); }
  const data = await res.json();
  return data.choices?.[0]?.message?.content || '(empty response)';
}

async function callGemini(key, systemPrompt, userPrompt){
  const model = 'gemini-1.5-flash';
  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}`;
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({contents:[{parts:[{text:systemPrompt+'\n\n'+userPrompt}]}], generationConfig:{maxOutputTokens:1500}})
  });
  if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error((err.error&&err.error.message)||'Gemini API error '+res.status); }
  const data = await res.json();
  return data.candidates?.[0]?.content?.parts?.[0]?.text || '(empty response)';
}

async function runAIAnalysis(mode, customQuery){
  const aiKey = getActiveAIKey();
  if(!aiKey){ showToast('Set an API key in AI Analysis settings first', 'error'); return; }
  if(aiLoading) return;
  aiLoading = true;
  const resultEl = document.getElementById('ai-result');
  if(resultEl){ resultEl.innerHTML = `<div style="text-align:center;padding:40px;"><div class="spinner"></div><p class="sub" style="margin-top:12px;">Analysing your trades…</p></div>`; }
  try{
    const {systemPrompt, userPrompt} = buildAIPrompt(mode, customQuery);
    let text;
    if(aiKey.provider==='openai') text = await callOpenAI(aiKey.key, systemPrompt, userPrompt);
    else text = await callGemini(aiKey.key, systemPrompt, userPrompt);
    if(resultEl){
      // render markdown-lite: bold, bullets
      const html = text
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
        .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
        .replace(/^#{1,3} (.+)$/gm,'<div style="font-weight:700;font-size:14px;margin:12px 0 6px;">$1</div>')
        .replace(/^[•\-\*] (.+)$/gm,'<div style="padding:2px 0 2px 16px;">• $1</div>')
        .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
      resultEl.innerHTML = `<div style="font-size:13px;line-height:1.75;padding:4px 0;">${html}</div>`;
    }
  }catch(e){
    if(resultEl) resultEl.innerHTML = `<div class="disclaimer-box" style="border-color:var(--loss);">${lucideIcon('alert-triangle')} <strong>API Error:</strong> ${escapeHtml(e.message)}<br><span class="sub">Check your API key and internet connection.</span></div>`;
    showToast('AI request failed: '+e.message, 'error');
  }finally{
    aiLoading = false;
    refreshIcons();
  }
}

let reportsActiveTab = 'monthly';

function groupJournalByPeriod(period){
  const closed = state.journal.filter(t=>t.pnl!=null&&(t.date||t.openedAt));
  const map = {};
  closed.forEach(t=>{
    const d = (t.date||t.openedAt||'').slice(0,10);
    const key = period==='yearly'?d.slice(0,4):period==='weekly'?getWeekKey(d):d.slice(0,7);
    if(!map[key]) map[key]={key, trades:[], pnl:0};
    map[key].trades.push(t);
    map[key].pnl += Number(t.pnl||0);
  });
  return Object.values(map).sort((a,b)=>a.key.localeCompare(b.key));
}
function getWeekKey(dateStr){
  const d = new Date(dateStr);
  const start = new Date(d); start.setDate(d.getDate()-d.getDay());
  return start.toISOString().slice(0,10);
}
function reportsCalendarHtml(){
  const monthMap={};
  state.journal.filter(t=>t.pnl!=null&&(t.date||t.openedAt)).forEach(t=>{

let mbChartInst = null;
let mbSelectedChart = 'ad';

function mbObs(){ return [...state.marketBreadthData].sort((a,b)=>new Date(a.date)-new Date(b.date)); }
function mbRegime(obs){
  if(obs.length<2) return {label:'Insufficient Data',cls:'neutral'};
  const recent = obs.slice(-5);
  const avgAD = recent.reduce((s,o)=>s+(Number(o.advances||0)-Number(o.declines||0)),0)/recent.length;
  const latestVix = Number(obs[obs.length-1].vix||0);
  if(avgAD>200&&latestVix<14) return {label:'Strong Bullish',cls:'profit'};
  if(avgAD>0&&latestVix<18) return {label:'Moderately Bullish',cls:'profit'};
  if(avgAD<-200||latestVix>24) return {label:'Bearish',cls:'loss'};
  if(latestVix>20) return {label:'Elevated Risk',cls:'warn'};
  return {label:'Neutral',cls:'neutral'};
}
function drawMbChart(){
  const canvas = document.getElementById('mb-chart-canvas');
  if(!canvas||typeof Chart==='undefined') return;
  if(mbChartInst){mbChartInst.destroy();mbChartInst=null;}
  const obs = mbObs();
  if(obs.length<2) return;
  let labels = obs.map(o=>formatDate(o.date,{day:'numeric',month:'short'}));
  let data, color, label;
  if(mbSelectedChart==='ad'){ data=obs.map(o=>Number(o.advances||0)-Number(o.declines||0)); color='#5b8def'; label='A/D Difference'; }
  else if(mbSelectedChart==='vix'){ data=obs.map(o=>Number(o.vix||0)); color='#f87171'; label='VIX'; }
  else if(mbSelectedChart==='pcr'){ data=obs.map(o=>Number(o.pcr||0)); color='#22d3ee'; label='Put/Call Ratio'; }
  else { data=obs.map(o=>Number(o.newHighs||0)-Number(o.newLows||0)); color='#34d399'; label='New Highs − Lows'; }
  mbChartInst = new Chart(canvas.getContext('2d'),{
    type:'line', data:{labels, datasets:[{data, borderColor:color, borderWidth:2, pointRadius:2, fill:false, tension:0.3}]},
    options:{responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>label+': '+formatNum(ctx.parsed.y,2)}}},
      scales:{x:{ticks:{color:'#5a6275',maxTicksLimit:8,font:{size:9}},grid:{display:false}},y:{ticks:{color:'#5a6275',font:{size:9}},grid:{color:'rgba(255,255,255,0.06)'}}}}

/* ============================================================
   PART 22 — POSITION ANALYZER
   Portfolio-level Greeks, exposure, and stress testing from
   all currently open paper positions.
   ============================================================ */
function computePortfolioGreeks(){
  const open = state.paperPositions.filter(p=>p.status==='open');
  let netDelta=0, netGamma=0, netTheta=0, netVega=0, netRho=0;
  let totalExposure=0, totalMargin=0, worstCase=0;
  const positionDetails = [];

  open.forEach(p=>{
    const quote = MarketDataService.getQuote(p.symbol);
    const spot = quote?quote.ltp:p.avgPrice;
    const livePrice = currentPaperPrice(p);
    const lotVal = p.qty * p.lotSize;
    const exposure = (p.strike||p.avgPrice||0) * lotVal;
    const margin = computePaperPositionMargin(p);
    totalExposure += exposure;
    totalMargin += margin;

    let greeks = {delta:0,gamma:0,theta:0,vega:0,rho:0};
    if(p.instrumentType==='option'&&p.strike&&p.daysToExpiryAtOpen){
      const dte = Math.max(0.5, p.daysToExpiryAtOpen - Math.max(0,(Date.now()-new Date(p.openedAt).getTime())/(86400000)));
      const g = blackScholes(spot, p.strike, dte, state.settings.riskFreeRatePct, state.settings.defaultIV, p.optionType);
      const sign = p.side==='long'?1:-1;
      greeks = {delta:g.delta*sign*lotVal, gamma:g.gamma*sign*lotVal, theta:g.theta*sign*lotVal, vega:g.vega*sign*lotVal, rho:g.rho*sign*lotVal};
    } else if(p.instrumentType==='future'){
      const sign = p.side==='long'?1:-1;
      greeks.delta = sign*lotVal;
    }
    netDelta+=greeks.delta; netGamma+=greeks.gamma; netTheta+=greeks.theta; netVega+=greeks.vega; netRho+=greeks.rho;

    // Worst-case: full premium loss for long options, 20% move against shorts
    if(p.instrumentType==='option'){
      worstCase += p.side==='long' ? p.avgPrice*lotVal : exposure*0.2;
    } else {
      worstCase += exposure*0.15;
    }
    const pnl = legPnlPerUnit(p,livePrice)*lotVal;
    positionDetails.push({...p, livePrice, pnl, exposure, margin, greeks});
  });

  const totalCapital = Number(state.settings.paperCapital)||1000000;
  const capitalDeployed = totalMargin;
  const capitalPct = totalCapital>0?(capitalDeployed/totalCapital)*100:0;
  const worstCasePct = totalCapital>0?(worstCase/totalCapital)*100:0;

  // Risk score 0–100 (higher = riskier)
  let riskScore = 0;
  riskScore += Math.min(40, capitalPct * 0.8);   // capital deployed weight
  riskScore += Math.min(30, worstCasePct * 0.6); // worst-case weight
  riskScore += Math.min(20, Math.abs(netDelta)/Math.max(1,open.length)*5); // delta concentration
  riskScore += Math.min(10, open.length * 2);    // position count

  return {open, netDelta, netGamma, netTheta, netVega, netRho, totalExposure, totalMargin,
    worstCase, capitalDeployed, capitalPct, worstCasePct, riskScore:clamp(riskScore,0,100), positionDetails, totalCapital};
}

function stressTestScenarios(positionDetails){
  const moves = [-20,-15,-10,-5,0,5,10,15,20];
  return moves.map(movePct=>{
    let pnl=0;
    positionDetails.forEach(p=>{
      const spot0 = MarketDataService.getQuote(p.symbol)?.ltp || p.avgPrice;
      const stressSpot = spot0*(1+movePct/100);
      const lotVal = p.qty*p.lotSize;
      if(p.instrumentType==='option'&&p.strike&&p.daysToExpiryAtOpen){
        const dte=Math.max(0.5,p.daysToExpiryAtOpen-1);
        const g=blackScholes(stressSpot,p.strike,dte,state.settings.riskFreeRatePct,state.settings.defaultIV,p.optionType);
        pnl+=(p.side==='long'?(g.price-p.avgPrice):(p.avgPrice-g.price))*lotVal;
      } else {
        pnl+=(p.side==='long'?1:-1)*(stressSpot-spot0)*lotVal;
      }
    });
    return {movePct, pnl};
  });
}

function computeReadinessScore(){
  const j = state.journal;
  const closed = j.filter(t=>t.pnl!=null);
  const strats = state.strategies;
  const bts = state.backtests;
  const pm = computePaperTradingMetrics();
  const arState = loadArState();

  const criteria = [
    {id:'journal_quality', label:'Journal Quality', desc:'At least 20 closed trades logged with notes and ratings.',
      met: closed.length>=20 && closed.filter(t=>t.notes&&t.rating).length>=10, value:closed.length, max:20, weight:20},
    {id:'strategy_quality', label:'Strategy Quality', desc:'At least 3 strategies built with payoff charts.',
      met: strats.length>=3, value:strats.length, max:3, weight:15},
    {id:'backtesting_quality', label:'Backtesting Done', desc:'At least 1 backtest profile with 30+ trades.',
      met: bts.some(b=>b.trades.length>=30), value:Math.max(0,...bts.map(b=>b.trades.length),0), max:30, weight:20},
    {id:'risk_rules', label:'Risk Rules Set', desc:'Daily and weekly loss limits configured in Settings.',
      met: state.settings.maxDailyLossPct>0&&state.settings.maxWeeklyLossPct>0, value:state.settings.maxDailyLossPct, max:5, weight:15},
    {id:'paper_trading', label:'Paper Trading History', desc:'At least 50 paper orders across 10+ positions.',
      met: state.paperOrders.length>=50&&state.paperPositions.length>=10, value:state.paperOrders.length, max:50, weight:20},
    {id:'capital_discipline', label:'Capital Discipline', desc:'Max drawdown in paper trading below 15%.',
      met: Math.abs(pm.maxDrawdownPct)<15 && pm.closedCount>=5, value:Math.abs(pm.maxDrawdownPct).toFixed(1), max:15, weight:10},
  ];
  const score = criteria.reduce((s,c)=>s+(c.met?c.weight:0),0);
  return {criteria, score};
}

/* ============================================================
   IMPROVED BACKUP VALIDATION
   ============================================================ */
function validateImportPayload(data){
  const errors = [];
  if(!data||typeof data!=='object') return {valid:false, errors:['Not a valid JSON object']};
  if(data.version && typeof data.version!=='number' && typeof data.version!=='string') errors.push('Invalid version field');
  const arrayFields = ['strategies','journal','watchlist','checklist','paperPositions','paperOrders','bsCalculations','optionChainSnapshots','volatilityObservations','backtests','economicEvents','marketBreadthData'];
  arrayFields.forEach(f=>{ if(data[f]!==undefined && !Array.isArray(data[f])) errors.push(f+' must be an array'); });
  if(data.settings && typeof data.settings!=='object') errors.push('settings must be an object');
  const totalRecords = arrayFields.reduce((s,f)=>s+(Array.isArray(data[f])?data[f].length:0),0);
  if(totalRecords===0 && !data.settings) errors.push('No data found in this export — file may be empty or corrupt');
  return {valid:errors.length===0, errors, totalRecords};
}

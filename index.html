let chainDraft = null;

function chainNewDraft(symbol){
  const meta = findSymbolMeta(symbol) || MARKET_SYMBOLS[0];
  const quote = MarketDataService.getQuote(meta.symbol);
  const spot = quote ? quote.ltp : meta.basePrice;
  const atm = roundToStrikeStep(spot, meta.strikeStep);
  const rows = [];
  for(let i=-3;i<=3;i++){
    rows.push({id:uid(), strike: atm + i*meta.strikeStep, ceOI:0, ceVolume:0, cePremium:0, ceIV:0, peOI:0, peVolume:0, pePremium:0, peIV:0});
  }
  return {symbol:meta.symbol, expiryLabel:'', underlyingPrice:spot, rows};
}
function computeChainAnalytics(rows){
  const totalCeOI = rows.reduce((s,r)=>s+(Number(r.ceOI)||0),0);
  const totalPeOI = rows.reduce((s,r)=>s+(Number(r.peOI)||0),0);
  const pcr = totalCeOI>0 ? totalPeOI/totalCeOI : 0;
  let maxPainStrike=null, minPain=Infinity;
  rows.forEach(candidate=>{
    const S = candidate.strike;
    let pain = 0;
    rows.forEach(row=>{
      pain += (Number(row.ceOI)||0)*Math.max(0, S-row.strike);
      pain += (Number(row.peOI)||0)*Math.max(0, row.strike-S);
    });
    if(pain<minPain){ minPain=pain; maxPainStrike=S; }
  });
  const support = rows.length ? rows.reduce((max,r)=> (Number(r.peOI)||0)>(Number(max.peOI)||0)?r:max) : null;
  const resistance = rows.length ? rows.reduce((max,r)=> (Number(r.ceOI)||0)>(Number(max.ceOI)||0)?r:max) : null;
  return {pcr, maxPainStrike, totalCeOI, totalPeOI, supportStrike: support?support.strike:null, resistanceStrike: resistance?resistance.strike:null};
}
function classifyBuildup(curOI, curPremium, prevOI, prevPremium){
  if(prevOI==null || prevPremium==null) return null;
  const oiUp = curOI > prevOI, premUp = curPremium > prevPremium;
  if(oiUp && premUp) return {label:'Long Buildup', cls:'profit'};
  if(oiUp && !premUp) return {label:'Short Buildup', cls:'loss'};
  if(!oiUp && !premUp) return {label:'Long Unwinding', cls:'warn'};
  if(!oiUp && premUp) return {label:'Short Covering', cls:'accent'};
  return null;
}
function findPreviousChainSnapshot(symbol, excludeId){
  return [...state.optionChainSnapshots]
    .filter(s=>s.symbol===symbol && s.id!==excludeId)
    .sort((a,b)=> new Date(b.capturedAt)-new Date(a.capturedAt))[0] || null;
}
function moneynessBadge(strike, spot, side){
  const isCall = side==='ce';
  const itm = isCall ? strike < spot : strike > spot;
  const atm = Math.abs(strike-spot) < (spot*0.0025);
  if(atm) return '<span class="badge badge-accent">ATM</span>';
  return itm ? '<span class="badge badge-profit">ITM</span>' : '<span class="badge badge-neutral">OTM</span>';
}
function chainRowHtml(row, prevSnapshot, spot){
  const prevRow = prevSnapshot ? prevSnapshot.rows.find(r=>r.strike===row.strike) : null;
  const ceBuild = prevRow ? classifyBuildup(Number(row.ceOI)||0, Number(row.cePremium)||0, Number(prevRow.ceOI)||0, Number(prevRow.cePremium)||0) : null;
  const peBuild = prevRow ? classifyBuildup(Number(row.peOI)||0, Number(row.pePremium)||0, Number(prevRow.peOI)||0, Number(prevRow.pePremium)||0) : null;
  return `<tr data-row-id="${row.id}">
    <td><input type="number" class="chain-input mono" data-field="ceOI" value="${row.ceOI||''}" placeholder="OI"></td>
    <td><input type="number" class="chain-input mono" data-field="ceVolume" value="${row.ceVolume||''}" placeholder="Vol"></td>
    <td><input type="number" class="chain-input mono" data-field="cePremium" value="${row.cePremium||''}" placeholder="Premium"></td>
    <td><input type="number" class="chain-input mono" data-field="ceIV" value="${row.ceIV||''}" placeholder="IV"></td>
    <td>${ceBuild?`<span class="badge badge-${ceBuild.cls}" style="font-size:9px;">${ceBuild.label}</span>`:''}</td>
    <td style="text-align:center;background:rgba(255,255,255,0.03);">
      <div class="mono" style="font-weight:700;">${row.strike}</div>
      ${moneynessBadge(row.strike, spot, 'ce')}
      <button class="icon-btn" style="width:22px;height:22px;margin-top:4px;" data-action="chain-remove-row" data-id="${row.id}">${lucideIcon('x')}</button>
    </td>

    <td><input type="number" class="chain-input mono" data-field="peIV" value="${row.peIV||''}" placeholder="IV"></td>
    <td><input type="number" class="chain-input mono" data-field="pePremium" value="${row.pePremium||''}" placeholder="Premium"></td>
    <td><input type="number" class="chain-input mono" data-field="peVolume" value="${row.peVolume||''}" placeholder="Vol"></td>
    <td><input type="number" class="chain-input mono" data-field="peOI" value="${row.peOI||''}" placeholder="OI"></td>

}

  return `<div style="display:flex;flex-direction:column;gap:4px;">

/* ============================================================
   PART 15 — VOLATILITY ANALYSIS
   ============================================================ */
let volSelectedSymbol = null;
let volIvChartInstance = null;
let volHvChartInstance = null;

function volObservationsFor(symbol){
  return state.volatilityObservations.filter(o=>o.symbol===symbol).sort((a,b)=>new Date(a.date)-new Date(b.date));
}
function computeHistoricalVolatility(obs){
  if(obs.length<2) return null;
  const returns = [];
  for(let i=1;i<obs.length;i++){
    if(obs[i].closePrice>0 && obs[i-1].closePrice>0) returns.push(Math.log(obs[i].closePrice/obs[i-1].closePrice));
  }
  if(returns.length<2) return null;
  const mean = returns.reduce((a,b)=>a+b,0)/returns.length;
  const variance = returns.reduce((a,b)=>a+(b-mean)*(b-mean),0)/(returns.length-1);
  return Math.sqrt(variance)*Math.sqrt(252)*100;
}
function computeIVRankPercentile(obs, currentIV){
  const ivs = obs.map(o=>o.impliedVol).filter(v=>v!=null && v>0);
  if(ivs.length<2 || currentIV==null) return {rank:null, percentile:null};
  const min = Math.min(...ivs), max = Math.max(...ivs);
  const rank = max>min ? ((currentIV-min)/(max-min))*100 : 50;
  const below = ivs.filter(v=>v<=currentIV).length;
  return {rank: clamp(rank,0,100), percentile: (below/ivs.length)*100};
}
function classifyVolRegime(ivRank){
  if(ivRank==null) return {label:'Insufficient Data', cls:'neutral'};
  if(ivRank<25) return {label:'Low', cls:'profit'};
  if(ivRank<65) return {label:'Normal', cls:'accent'};
  if(ivRank<85) return {label:'High', cls:'warn'};
  return {label:'Extreme', cls:'loss'};
}
function volGaugeHtml(ivRank, regime){
  const pos = ivRank==null ? 0 : clamp(ivRank,0,100);
  return `<div style="margin-bottom:6px;">
    <div style="display:flex;height:10px;border-radius:99px;overflow:hidden;">
      <div style="flex:25;background:var(--profit);"></div>
      <div style="flex:40;background:var(--accent);"></div>
      <div style="flex:20;background:var(--warn);"></div>
      <div style="flex:15;background:var(--loss);"></div>
    </div>
    <div style="position:relative;height:14px;">
      <div style="position:absolute;left:${pos}%;top:0;transform:translateX(-50%);width:2px;height:14px;background:#fff;box-shadow:0 0 6px rgba(255,255,255,0.8);"></div>
    </div>
  </div>
  <div style="display:flex;justify-content:space-between;font-size:10px;color:var(--text-tertiary);"><span>Low</span><span>Normal</span><span>High</span><span>Extreme</span></div>`;
}
function volSummaryHtml(symbol){
  const obs = volObservationsFor(symbol);
  const latest = obs.length ? obs[obs.length-1] : null;
  const hv = computeHistoricalVolatility(obs);
  const ivStats = computeIVRankPercentile(obs, latest?latest.impliedVol:null);
  const regime = classifyVolRegime(ivStats.rank);
  const meta = findSymbolMeta(symbol);
  const quote = MarketDataService.getQuote(symbol);
  const spot = quote ? quote.ltp : (latest?latest.closePrice:meta.basePrice);
  const expectedMove7d = latest && latest.impliedVol ? spot*(latest.impliedVol/100)*Math.sqrt(7/365) : null;
  return `
    <div class="kpi-grid">
      ${kpiCard('Historical Volatility', hv!=null?formatPct(hv,1):'—', '', 'activity', obs.length+' observations logged')}
      ${kpiCard('Latest IV', latest&&latest.impliedVol!=null?formatPct(latest.impliedVol,1):'—', '', 'waves')}
      ${kpiCard('IV Rank', ivStats.rank!=null?formatPct(ivStats.rank,0):'—', '', 'gauge')}
      ${kpiCard('IV Percentile', ivStats.percentile!=null?formatPct(ivStats.percentile,0):'—', '', 'percent')}
      ${kpiCard('Expected Move (7D)', expectedMove7d!=null?('±'+formatNum(expectedMove7d,1)):'—', '', 'arrows-up-down')}
      ${kpiCard('Regime', regime.label, '', 'flag', undefined, regime.cls)}
    </div>
    <div class="card" style="margin-top:16px;margin-bottom:16px;">
      <div class="card-title"><span>Volatility Regime Gauge</span></div>
      ${volGaugeHtml(ivStats.rank, regime)}
      <p class="sub" style="font-size:11px;margin-top:10px;">Heuristic bands by IV Rank: Low &lt;25, Normal 25–65, High 65–85, Extreme &gt;85. Needs at least 2 logged IV readings to compute.</p>
    </div>
  `;
}

function drawVolCharts(){
  const obs = volObservationsFor(volSelectedSymbol);
  const ivCanvas = document.getElementById('vol-iv-chart');
  if(volIvChartInstance){ volIvChartInstance.destroy(); volIvChartInstance=null; }
  if(ivCanvas && typeof Chart!=='undefined' && obs.filter(o=>o.impliedVol!=null).length>=2){
    const withIv = obs.filter(o=>o.impliedVol!=null);
    volIvChartInstance = new Chart(ivCanvas.getContext('2d'), {
      type:'line', data:{labels:withIv.map(o=>formatDate(o.date,{day:'numeric',month:'short'})), datasets:[{data:withIv.map(o=>o.impliedVol), borderColor:'#22d3ee', borderWidth:2, pointRadius:0, fill:false}]},
      options:{responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#5a6275',maxTicksLimit:6,font:{size:9}},grid:{display:false}}, y:{ticks:{color:'#5a6275',font:{size:9},callback:(v)=>v+'%'},grid:{color:'rgba(255,255,255,0.06)'}}}}
    });
  }
  const hvCanvas = document.getElementById('vol-hv-chart');
  if(volHvChartInstance){ volHvChartInstance.destroy(); volHvChartInstance=null; }
  if(hvCanvas && typeof Chart!=='undefined' && obs.length>=11){
    const rolling = [];
    for(let i=10;i<obs.length;i++){
      const hv = computeHistoricalVolatility(obs.slice(i-10,i+1));
      if(hv!=null) rolling.push({date:obs[i].date, hv});
    }
    volHvChartInstance = new Chart(hvCanvas.getContext('2d'), {
      type:'line', data:{labels:rolling.map(r=>formatDate(r.date,{day:'numeric',month:'short'})), datasets:[{data:rolling.map(r=>r.hv), borderColor:'#5b8def', borderWidth:2, pointRadius:0, fill:false}]},
      options:{responsive:true,maintainAspectRatio:false, plugins:{legend:{display:false}}, scales:{x:{ticks:{color:'#5a6275',maxTicksLimit:6,font:{size:9}},grid:{display:false}}, y:{ticks:{color:'#5a6275',font:{size:9},callback:(v)=>v+'%'},grid:{color:'rgba(255,255,255,0.06)'}}}}
    });
  }
}
function renderVolatilityAnalysis(container){
  if(!volSelectedSymbol) volSelectedSymbol = MARKET_SYMBOLS[0].symbol;
  const obsWithIv = volObservationsFor(volSelectedSymbol).filter(o=>o.impliedVol!=null).length;
  const obsCount = volObservationsFor(volSelectedSymbol).length;
  container.innerHTML = `
    <div class="view-head-row">
      <div><h1>Volatility Analysis</h1><p class="sub">Historical volatility, IV rank/percentile and regime — from data you log</p></div>
      <select id="vol-symbol-pick" style="max-width:160px;">${MARKET_SYMBOLS.map(s=>`<option value="${s.symbol}" ${s.symbol===volSelectedSymbol?'selected':''}>${s.symbol}</option>`).join('')}</select>
    </div>
    <div id="vol-summary">${volSummaryHtml(volSelectedSymbol)}</div>
    <div class="card" style="margin-bottom:16px;">
      <div class="card-title"><span>Log Daily Observation</span>${lucideIcon('plus-circle')}</div>
      <div class="row-3">
        <div class="field"><label>Date</label><input type="date" id="vol-date" value="${todayISO()}"></div>
        <div class="field"><label>Close price</label><input type="number" id="vol-close" placeholder="0"></div>
        <div class="field"><label>ATM IV %</label><input type="number" id="vol-iv" placeholder="optional"></div>
      </div>
      <button class="btn btn-primary btn-block" id="vol-save-btn">${lucideIcon('check')} Log Observation</button>
    </div>
    <div class="grid-2" style="margin-bottom:16px;">
      <div class="card"><div class="card-title"><span>IV History</span></div>
        ${obsWithIv>=2 ? `<div style="height:160px;"><canvas id="vol-iv-chart"></canvas></div>` : emptyState('waves','Need 2+ IV readings','Log at least two days with an IV reading to chart this.')}
      </div>
      <div class="card"><div class="card-title"><span>Rolling 10-Obs Historical Volatility</span></div>
        ${obsCount>=11 ? `<div style="height:160px;"><canvas id="vol-hv-chart"></canvas></div>` : emptyState('activity','Need 11+ observations','Log at least 11 daily closes to chart a rolling HV trend.')}
      </div>
    </div>
    <div class="card">
      <div class="card-title"><span>Logged Observations</span></div>
      <div id="vol-obs-list"></div>
    </div>
  `;
  document.getElementById('vol-symbol-pick').addEventListener('change', (e)=>{ volSelectedSymbol = e.target.value; navigateTo('volatilityAnalysis'); });
  document.getElementById('vol-save-btn').addEventListener('click', saveVolObservation);
  renderVolObservationsList();
  drawVolCharts();
  refreshIcons();
}
VIEW_RENDERERS.volatilityAnalysis = renderVolatilityAnalysis;

</script>
</body>
</html>
